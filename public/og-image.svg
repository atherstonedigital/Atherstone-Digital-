<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111a11;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent" />
      <stop offset="50%" style="stop-color:#00dc82;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:transparent" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="310" width="1200" height="1" fill="url(#glow)"/>
  <!-- Brand name -->
  <text x="80" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" letter-spacing="6" fill="#ffffff" text-transform="uppercase">ATHERSTONE.</text>
  <!-- Tagline -->
  <text x="80" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#ffffff">Fractional Ecommerce</text>
  <text x="80" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#ffffff">Director</text>
  <!-- Green accent text -->
  <text x="80" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#00dc82">AI-Augmented. Shopify-Native.</text>
  <!-- Subtitle -->
  <text x="80" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8b9a8b">Strategy, development, and growth for Shopify brands doing £500k–£5M</text>
  <!-- Green accent bar -->
  <rect x="80" y="560" width="120" height="4" rx="2" fill="#00dc82"/>
  <!-- Green dot top-left -->
  <circle cx="80" cy="100" r="8" fill="#00dc82"/>
</svg>
