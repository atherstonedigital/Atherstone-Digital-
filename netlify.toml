[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "18"

# Domain redirect (non-www → www) is handled by Netlify Domain Management.
# Set www.atherstonedigital.com as the PRIMARY domain in:
# Netlify Dashboard → Domain management → Set as primary domain

# Phase 1 re-anchor: 301 the retired term-carrying URLs to their Shopify-anchored slugs
[[redirects]]
  from = "/fractional-ecommerce-director"
  to = "/shopify-ecommerce-consultant"
  status = 301
  force = true

[[redirects]]
  from = "/why-fractional"
  to = "/why-not-an-agency"
  status = 301
  force = true

# Renamed founder image: 301 the old path in case it was ever linked or indexed
[[redirects]]
  from = "/dan-le-gresley-speaker-fractional-ecommerce-director-shopify.png"
  to = "/dan-le-gresley-shopify-ecommerce-consultant.png"
  status = 301
  force = true

# Redirect old /locations/ pages to homepage
[[redirects]]
  from = "/locations/*"
  to = "/"
  status = 301
  force = true

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/atherstone-5-metrics.pdf"
  [headers.values]
    Content-Type = "application/pdf"
    Content-Disposition = "attachment; filename=\"atherstone-5-metrics.pdf\""
    Cache-Control = "public, max-age=86400"

# No SPA catch-all redirect needed — Next.js SSG generates real HTML files
