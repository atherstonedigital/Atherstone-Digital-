[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "18"

# TASK 1: www to non-www 301 redirect
[[redirects]]
  from = "https://www.atherstonedigital.com/*"
  to = "https://atherstonedigital.com/:splat"
  status = 301
  force = true

# TASK 8: Redirect old /locations/ pages to homepage
[[redirects]]
  from = "/locations/*"
  to = "/"
  status = 301
  force = true

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No SPA catch-all redirect needed — Next.js SSG generates real HTML files
